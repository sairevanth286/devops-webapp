<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome E-Commerce</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4; }
        .product { border: 1px solid #ccc; padding: 20px; display: inline-block; background: white; margin: 10px; border-radius: 5px; }
        .button { background-color: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px; }
        .button:hover { background-color: #0056b3; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Welcome to Awesome E-Commerce</h1>
    <p>Deployed successfully via Automated CI/CD Pipeline!</p>

    <div class="product">
        <h2>Cool T-Shirt</h2>
        <p>$19.99</p>
        <button class="button">Add to Cart</button>
    </div>
    
    <div class="product">
        <h2>Smart Watch</h2>
        <p>$99.99</p>
        <button class="button">Add to Cart</button>
    </div>
</body>
</html>
